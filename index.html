<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0c12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>MoneyTracker</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icono-moneda.png" />
  <link rel="apple-touch-icon" href="icono-moneda.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0c12;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    .landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0;
      animation: fadeIn 600ms ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .landing-icon {
      width: 90px;
      height: 90px;
      object-fit: contain;
      filter: drop-shadow(0 0 20px rgba(255,181,71,0.5));
    }

    .landing-name {
      margin-top: 20px;
      font-family: 'DM Serif Display', serif;
      font-size: 32px;
      color: #f0f2f8;
      letter-spacing: 0.01em;
      white-space: nowrap;
      overflow: hidden;
      width: 0;
      border-right: 2px solid rgba(240,242,248,0.7);
    }

    .landing-name.typing {
      animation: cursor-blink 530ms step-end infinite;
    }

    .landing-name.done {
      border-right-color: transparent;
    }

    @keyframes cursor-blink {
      0%, 100% { border-right-color: rgba(240,242,248,0.7); }
      50%       { border-right-color: transparent; }
    }

    /* Start button */
    .landing-btn {
      margin-top: 52px;
      padding: 14px 52px;
      background: #ffb547;
      border: none;
      border-radius: 50px;
      color: #0a0c12;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.03em;
      text-decoration: none;
      display: inline-block;
      opacity: 0;
      animation: btnShimmer 2.4s ease-in-out infinite;
    }

    .landing-btn.visible {
      opacity: 1;
      transition: opacity 500ms ease;
    }

    .landing-btn:active,
    .landing-btn.tapped { transform: scale(0.96); }

    @keyframes btnShimmer {
      0%, 100% { box-shadow: 0 0 12px rgba(255,181,71,0.25); }
      50%       { box-shadow: 0 0 28px rgba(255,220,80,0.55), 0 0 6px rgba(255,220,80,0.3); }
    }
  </style>
</head>
<body>
  <div class="landing">
    <img src="icono-moneda.png" alt="MoneyTracker" class="landing-icon" />
    <span class="landing-name" id="appName"></span>
    <a href="home.html" class="landing-btn" id="startBtn">Iniciar</a>
  </div>

  <script>
    const TEXT     = 'MoneyTracker';
    const nameEl   = document.getElementById('appName');
    const btn      = document.getElementById('startBtn');
    const CHAR_MS  = 80;
    const START_MS = 700;

    const ctx = new (window.AudioContext || window.webkitAudioContext)();

    function playKeyClick() {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const filter = ctx.createBiquadFilter();

      filter.type = 'lowpass';
      filter.frequency.value = 900;
      filter.Q.value = 0.5;

      osc.type = 'square';
      osc.frequency.setValueAtTime(180, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.04);

      gain.gain.setValueAtTime(0.12, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.06);

      osc.connect(filter);
      filter.connect(gain);
      gain.connect(ctx.destination);

      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime + 0.06);
    }

    function typeWriter() {
      nameEl.classList.add('typing');
      let i = 0;

      function next() {
        if (i < TEXT.length) {
          nameEl.textContent = TEXT.slice(0, i + 1);
          nameEl.style.width = 'auto';
          playKeyClick();
          i++;
          setTimeout(next, CHAR_MS + Math.random() * 30);
        } else {
          nameEl.classList.remove('typing');
          nameEl.classList.add('done');
          btn.classList.add('visible');
        }
      }

      setTimeout(next, START_MS);
    }

    document.addEventListener('touchstart', () => {
      if (ctx.state === 'suspended') ctx.resume();
    }, { once: true, passive: true });

    window.addEventListener('load', typeWriter);

    btn.addEventListener('touchstart', () => btn.classList.add('tapped'),   { passive: true });
    btn.addEventListener('touchend',   () => btn.classList.remove('tapped'));
    btn.addEventListener('touchcancel',() => btn.classList.remove('tapped'));

  </script>
</body>
</html>
